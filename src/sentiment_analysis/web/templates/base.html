<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sentiment Analysis{% endblock %} | ReviewSense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="brand">
        <span class="brand-icon">◈</span>
        ReviewSense
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="/" class="{% if page == 'home' %}active{% endif %}">Dashboard</a></li>
        <li><a href="/predict" class="{% if page == 'predict' %}active{% endif %}">Predict</a></li>
        <li><a href="/batch" class="{% if page == 'batch' %}active{% endif %}">Batch</a></li>
        <li><a href="/metrics" class="{% if page == 'metrics' %}active{% endif %}">Metrics</a></li>
        <li><a href="/analytics" class="{% if page == 'analytics' %}active{% endif %}">Analytics</a></li>
      </ul>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>ReviewSense &mdash; NLP Sentiment Analysis for E-commerce Reviews</p>
    <p class="footer-meta">FastAPI · MLflow · DVC · Docker</p>
  </footer>

  <script src="/static/js/common.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
